name: Reusable Build LaTeX

on:
  workflow_call:
    inputs:
      source_repository:
        description: Source repository to checkout and build
        required: true
        type: string
      source_ref:
        description: Ref or SHA to checkout from the source repository
        required: true
        type: string
      build_command:
        description: Command used to build the document set
        required: true
        type: string
      artifact_path:
        description: Path to upload as the PDF artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name for generated PDFs
        required: true
        type: string
      strict_build:
        description: Whether STRICT_SECTIONS should be enabled during build
        required: false
        default: false
        type: boolean
      clean_command:
        description: Optional cleanup command to run after building
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Retention period for the uploaded build artifact
        required: false
        default: 30
        type: number

concurrency:
  group: latex-build-${{ inputs.source_repository }}
  cancel-in-progress: true

jobs:
  build-latex:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}

      - name: Install TeX Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-luatex texlive-latex-extra

      - name: Build PDFs
        env:
          STRICT_SECTIONS: ${{ inputs.strict_build && 'true' || 'false' }}
        run: ${{ inputs.build_command }}

      - name: Clean Build Artifacts
        if: ${{ inputs.clean_command != '' }}
        run: ${{ inputs.clean_command }}

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: ${{ inputs.artifact_retention_days }}