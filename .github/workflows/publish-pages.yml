name: Reusable Publish GitHub Pages

on:
  workflow_call:
    inputs:
      source_repository:
        description: Source repository to checkout and build
        required: true
        type: string
      source_ref:
        description: Ref or SHA to checkout from the source repository
        required: true
        type: string
      build_command:
        description: Command used to build the document set
        required: true
        type: string
      artifact_path:
        description: Path containing built PDFs
        required: true
        type: string
      artifact_name:
        description: Artifact name for generated PDFs
        required: true
        type: string
      strict_build:
        description: Whether STRICT_SECTIONS should be enabled during build
        required: false
        default: false
        type: boolean
      clean_command:
        description: Optional cleanup command to run after building
        required: false
        default: ""
        type: string
      page_title:
        description: Optional title for the generated Pages index
        required: false
        default: "LaTeX Build Artifacts"
        type: string
      page_description:
        description: Optional description for the generated Pages index
        required: false
        default: "Generated from the latest build."
        type: string
      artifact_retention_days:
        description: Retention period for the uploaded build artifact
        required: false
        default: 30
        type: number

concurrency:
  group: latex-pages-${{ inputs.source_repository }}
  cancel-in-progress: true

jobs:
  build-pages-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}

      - name: Set Up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install TeX Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-luatex texlive-latex-extra

      - name: Build PDFs
        env:
          STRICT_SECTIONS: ${{ inputs.strict_build && 'true' || 'false' }}
        run: ${{ inputs.build_command }}

      - name: Clean Build Artifacts
        if: ${{ inputs.clean_command != '' }}
        run: ${{ inputs.clean_command }}

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Build GitHub Pages Site
        uses: marvinkassabian/latex-document-ops/.github/actions/build-pages-site@main
        with:
          artifact_path: ${{ inputs.artifact_path }}
          page_title: ${{ inputs.page_title }}
          page_description: ${{ inputs.page_description }}

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-github-pages:
    needs: build-pages-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
