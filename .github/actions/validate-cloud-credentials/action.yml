name: Validate Cloud Credentials
description: Validate cloud provider credentials with redacted diagnostics
inputs:
  provider:
    description: Cloud provider name
    required: true
  secrets_json:
    description: JSON map of inherited secrets from workflow context
    required: false
    default: "{}"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        python3 "$GITHUB_ACTION_PATH/validate_cloud_credentials.py" \
          "${{ inputs.provider }}" \
          "${{ inputs.secrets_json }}"
