name: Validate Conventional Commits
description: Validate commit subjects against Conventional Commits format
inputs:
  event_name:
    description: GitHub event name
    required: false
    default: ""
  before_sha:
    description: Previous commit SHA for push events
    required: false
    default: ""
  after_sha:
    description: Current commit SHA for push events
    required: false
    default: ""
  pr_base_sha:
    description: Base commit SHA for pull request events
    required: false
    default: ""
  pr_head_sha:
    description: Head commit SHA for pull request events
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      env:
        EVENT_NAME: ${{ inputs.event_name }}
        BEFORE_SHA: ${{ inputs.before_sha }}
        AFTER_SHA: ${{ inputs.after_sha }}
        PR_BASE_SHA: ${{ inputs.pr_base_sha }}
        PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
      run: |
        python3 "$GITHUB_ACTION_PATH/validate_conventional_commits.py"